; tests-native/platformio.ini — self-contained HOST unit-test project for HyphenOS.
;
; Why a separate directory: the real firmware platformio.ini is generated by
; Hyphen Command Center and is gitignored, and `pio test -c <file>` does not
; propagate the custom config across multiple test suites (it falls back to the
; generated platformio.ini, which has no [env:native]). Keeping the native env in
; its own project dir makes it the default config there, so a plain
; `pio test -e native` just works for any number of suites.
;
;   Run:  cd tests-native && pio test -e native
;
; The actual suites + shims live in ../test/native (shared, not duplicated).
; Tests run on the host with Unity — no ESP32, no network, no certs.
[platformio]
test_dir = ${PROJECT_DIR}/../test/native
default_envs = native

[env:native]
platform = native
test_framework = unity
build_flags =
  -std=gnu++17
  -D HYPHEN_NATIVE_TEST
  -D ARDUINOJSON_ENABLE_ARDUINO_STRING=1
  -I ${PROJECT_DIR}/../src
  -I ${PROJECT_DIR}/../test/native/shims
  -I ${PROJECT_DIR}/../test/native
  -D DEVICE_PUBLIC_ID=\"testdevice0001\"
  -D MQTT_TOPIC_BASE=\"Hy/\"
  -D TIMEZONE_SET=9
lib_deps =
  ArduinoJson@^7.4.2
lib_ldf_mode = chain
lib_compat_mode = off
