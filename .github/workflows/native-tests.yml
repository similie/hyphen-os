name: native-tests

# Host (desktop/CI) unit tests for HyphenOS — no ESP32 hardware, no network, no
# certs. Mirrors the HyphenConnect harness. The native test project lives in
# tests-native/ because the real firmware platformio.ini is generated by Hyphen
# Command Center and is gitignored; see tests-native/platformio.ini.

on:
  push:
    branches: [main, cleanup]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('tests-native/platformio.ini') }}
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Run native unit tests
        working-directory: tests-native
        run: pio test -e native
